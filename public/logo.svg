<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Stylized E with leaf accent -->
  <g transform="translate(256,256)">
    <!-- Vertical stem -->
    <line x1="-90" y1="-130" x2="-90" y2="130" stroke="white" stroke-width="42" stroke-linecap="round"/>
    <!-- Top bar -->
    <line x1="-90" y1="-130" x2="90" y2="-130" stroke="white" stroke-width="42" stroke-linecap="round"/>
    <!-- Middle bar -->
    <line x1="-90" y1="0" x2="60" y2="0" stroke="white" stroke-width="42" stroke-linecap="round"/>
    <!-- Bottom bar -->
    <line x1="-90" y1="130" x2="90" y2="130" stroke="white" stroke-width="42" stroke-linecap="round"/>
    <!-- Leaf accent sprouting from top-right -->
    <path d="M75,-130 C75,-130 140,-170 150,-130 C160,-90 120,-80 90,-100"
          stroke="#86efac" stroke-width="8" fill="#86efac" fill-opacity="0.4"/>
    <path d="M82,-128 Q120,-150 140,-120"
          stroke="white" stroke-width="3" fill="none" stroke-opacity="0.6"/>
  </g>
</svg>
